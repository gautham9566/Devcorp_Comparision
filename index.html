            padding: 0 32px;

            font-weight: 600;

            align-items: center;
            justify-content: center;
        }

        .legend-item.partial .circle { background: #fcd34d; color: #78350f; }

            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            padding: 8px 32px 28px;
        }

            padding: 7px 16px;

            border: 1.5px solid #dce3ef;
            background: #ffffff;
            color: #64748b;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;

        .cat-btn:hover {
            border-color: #4f7cfc;
            color: #4f7cfc;
        }

        .cat-btn.active {
            background: #4f7cfc;
            color: #ffffff;
            border-color: #4f7cfc;

            margin: 0 16px 16px;

            text-align: center;
            vertical-align: bottom;
            background: #ffffff;
            border-bottom: 2px solid #eef1f6;

            font-weight: 800;
            padding-left: 28px;
            position: sticky;
            left: 0;
            z-index: 10;

            border-left: 1px solid #4f7cfc20;
            border-right: 1px solid #4f7cfc20;

            border-radius: 18px 18px 0 0;
            border-left: none;
            border-right: none;

            content: "";

            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0) 100%);

            pointer-events: none;

            align-items: center;

            justify-content: center;
            font-size: 18px;
            font-weight: 800;

            });
        }

        /* ─── Create Icon ─── */
        function createIcon(val) {
            const span = document.createElement('span');
            if (val === '✓') {
                span.className = 'icon-check';
                span.innerHTML = checkSVG;
            } else if (val === '~') {
                span.className = 'icon-partial';
                span.innerHTML = partialSVG;
            } else {
                span.className = 'icon-x';
                span.innerHTML = xSVG;
            }
            return span;
        }

        /* ─── Render Table ─── */
        function renderTable() {
            const headerRow = document.getElementById('toolHeaderRow');
            const tbody = document.getElementById('tableBody');

            // Feature column header
            const feaTh = document.createElement('th');
            feaTh.className = 'feature-header';
            feaTh.textContent = 'Feature';
            headerRow.appendChild(feaTh);

            // Tool headers
            tools.forEach(tool => {
                const th = document.createElement('th');
                if (tool.featured) th.classList.add('featured-col');
                const wrapper = document.createElement('div');
                wrapper.className = 'tool-header';
                const logo = document.createElement('div');
                logo.className = 'tool-logo';
                logo.textContent = tool.initial;
                if (tool.featured) {
                    logo.style.background = 'rgba(255,255,255,0.2)';
                    logo.style.color = '#ffffff';
                } else {
                    logo.style.background = tool.color + '15';
                    logo.style.color = tool.color;
                    logo.style.border = '2px solid ' + tool.color + '30';
                }
                const name = document.createElement('div');
                name.className = 'tool-name';
                name.textContent = tool.name;
                const tagline = document.createElement('div');
                tagline.className = 'tool-tagline';
                tagline.textContent = tool.tagline;
                wrapper.appendChild(logo);
                wrapper.appendChild(name);
                wrapper.appendChild(tagline);
                th.appendChild(wrapper);
                headerRow.appendChild(th);
            });

            // Feature rows
            features.forEach(feat => {
                const row = document.createElement('tr');
                row.setAttribute('data-type', 'feature');
                row.setAttribute('data-category', feat.category);
                const feaTd = document.createElement('td');
                feaTd.className = 'feature-cell';
                feaTd.textContent = feat.label;
                if (feat.info) {
                    const infoSpan = document.createElement('span');
                    infoSpan.className = 'info-icon';
                    infoSpan.textContent = 'i';
                    feaTd.appendChild(infoSpan);
                }
                row.appendChild(feaTd);
                tools.forEach(tool => {
                    const td = document.createElement('td');
                    if (tool.featured) td.classList.add('featured-col');
                    const val = tool.features[feat.label] || '✗';
                    td.appendChild(createIcon(val));
                    row.appendChild(td);
                });
                tbody.appendChild(row);
            });

            // Pricing row
            addSummaryRow(tbody, 'Pricing', tool => tool.pricing);

            // CTA row
            const ctaRow = document.createElement('tr');
            const ctaLabel = document.createElement('td');
            ctaLabel.className = 'cta-row-label';
            ctaRow.appendChild(ctaLabel);
            tools.forEach(tool => {
                const td = document.createElement('td');
                td.className = 'cta-cell';
                if (tool.featured) td.classList.add('featured-col');
                const btn = document.createElement('button');
                btn.className = tool.featured ? 'cta-btn cta-btn-primary' : 'cta-btn cta-btn-secondary';
                btn.textContent = tool.featured ? 'Get Started' : 'Learn More';
                td.appendChild(btn);
                ctaRow.appendChild(td);
            });
            tbody.appendChild(ctaRow);
        }

        function addSummaryRow(tbody, label, getValue) {
            const row = document.createElement('tr');
            const labelTd = document.createElement('td');
            labelTd.className = 'summary-label';
            labelTd.textContent = label;
            row.appendChild(labelTd);
            tools.forEach(tool => {
                const td = document.createElement('td');
                td.className = 'summary-data';
                if (tool.featured) td.classList.add('featured-col');
                td.textContent = getValue(tool);
                row.appendChild(td);
            });
            tbody.appendChild(row);
        }

        init();
    </script>
</body>
</html>
